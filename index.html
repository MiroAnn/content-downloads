<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Материалы для скачивания</title>
  <style>
    :root { color-scheme: dark; --bg:#080808; --card:#121212; --text:#fff; --muted:#a9a9a9; --accent:#25bdf4; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family:Inter,Arial,sans-serif; }
    main { width:min(1180px,calc(100% - 32px)); margin:0 auto; padding:56px 0 80px; }
    h1 { margin:0 0 12px; font-size:clamp(34px,6vw,68px); line-height:1; }
    .intro { margin:0 0 40px; color:var(--muted); font-size:18px; }
    article { padding:28px; border:1px solid #292929; border-radius:24px; background:var(--card); }
    .heading { display:flex; gap:20px; align-items:center; justify-content:space-between; margin-bottom:28px; }
    h2 { margin:0; font-size:clamp(24px,4vw,40px); }
    .download { display:inline-block; padding:14px 20px; border-radius:999px; background:var(--accent); color:#00131b; font-weight:800; text-decoration:none; white-space:nowrap; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:18px; }
    figure { margin:0; }
    figure a { display:block; border-radius:16px; overflow:hidden; background:#000; }
    img { display:block; width:100%; height:auto; }
    figcaption { margin-top:8px; color:var(--muted); font-size:14px; }
    @media(max-width:640px){ main{padding-top:32px}.heading{align-items:flex-start;flex-direction:column}article{padding:18px} }
  </style>
</head>
<body>
  <main>
    <h1>Материалы для скачивания</h1>
    <p class="intro">Карусели философского клуба. Нажмите на слайд, чтобы открыть оригинальный PNG.</p>
    <article>
      <div class="heading">
        <h2>5 вопросов своей команде</h2>
        <a class="download" href="carousels/5-questions-for-team/carousel.zip" download>Скачать всё ZIP</a>
      </div>
      <div class="grid">
        <figure><a href="carousels/5-questions-for-team/01-cover.png"><img src="carousels/5-questions-for-team/01-cover.png" alt="Обложка" loading="lazy"></a><figcaption>01 — Обложка</figcaption></figure>
        <figure><a href="carousels/5-questions-for-team/02-question-1.png"><img src="carousels/5-questions-for-team/02-question-1.png" alt="Вопрос 1" loading="lazy"></a><figcaption>02 — Вопрос 1</figcaption></figure>
        <figure><a href="carousels/5-questions-for-team/03-question-2.png"><img src="carousels/5-questions-for-team/03-question-2.png" alt="Вопрос 2" loading="lazy"></a><figcaption>03 — Вопрос 2</figcaption></figure>
        <figure><a href="carousels/5-questions-for-team/04-question-3.png"><img src="carousels/5-questions-for-team/04-question-3.png" alt="Вопрос 3" loading="lazy"></a><figcaption>04 — Вопрос 3</figcaption></figure>
        <figure><a href="carousels/5-questions-for-team/05-question-4.png"><img src="carousels/5-questions-for-team/05-question-4.png" alt="Вопрос 4" loading="lazy"></a><figcaption>05 — Вопрос 4</figcaption></figure>
        <figure><a href="carousels/5-questions-for-team/06-question-5.png"><img src="carousels/5-questions-for-team/06-question-5.png" alt="Вопрос 5" loading="lazy"></a><figcaption>06 — Вопрос 5</figcaption></figure>
        <figure><a href="carousels/5-questions-for-team/07-product-integration.png"><img src="carousels/5-questions-for-team/07-product-integration.png" alt="Запись в философский клуб" loading="lazy"></a><figcaption>07 — Запись в клуб</figcaption></figure>
      </div>
    </article>
  </main>
</body>
</html>
